<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>🌟 营养躲猫猫 🌟</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* --- 可爱轻快风格 CSS --- */
        :root {
            --bg-color: #fefaf1; 
            --card-color: #ffffff;
            --text-main: #5d4037; 
            --text-sub: #a1887f;
            --primary-color: #ff9242; 
            --protein-color: #ff7043; 
            --carbs-color: #ffa726;   
            --secondary-color: #a8e6cf; 
            --danger-color: #ff6b6b; 
            --radius-big: 25px; 
            --radius-small: 15px;
            --shadow: 0 8px 20px rgba(255, 146, 66, 0.1);
        }

        body {
            font-family: "PingFang SC", "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            padding-top: calc(20px + env(safe-area-inset-top)); 
            padding-bottom: 90px; 
            color: var(--text-main);
            -webkit-tap-highlight-color: transparent; 
        }

        h2, h3 { margin-top: 0; font-weight: 900; }
        h3 { font-size: 18px; display: flex; align-items: center; gap: 8px; }

        .card { background-color: var(--card-color); border-radius: var(--radius-big); padding: 25px; margin-bottom: 20px; box-shadow: var(--shadow); border: 2px solid #fff3e0; }

        input { width: 100%; padding: 12px; border: 2px solid #ffe0b2; border-radius: var(--radius-small); font-size: 15px; box-sizing: border-box; background-color: #fffde7; color: var(--text-main); transition: 0.3s; }
        input:focus { outline: none; border-color: var(--primary-color); background-color: #ffffff; }
        .input-row { display: flex; gap: 10px; margin-bottom: 10px; }

        button { border: none; cursor: pointer; transition: all 0.2s ease; font-weight: bold; display: inline-flex; align-items: center; justify-content: center; box-sizing: border-box; }
        button:active { transform: scale(0.95); opacity: 0.8; }

        .btn-block { width: 100%; padding: 15px; border-radius: 30px; font-size: 17px; margin-top: 5px; }
        .btn-primary { background-color: var(--primary-color); color: white; box-shadow: 0 4px 10px rgba(255,146,66,0.3); }
        .btn-success { background-color: var(--secondary-color); color: var(--text-main); }
        .btn-danger { background-color: var(--danger-color); color: white; }

        .btn-food { background-color: #fffde7; color: #d84315; border: 2px solid #fff9c4; margin: 5px; padding: 8px 15px; border-radius: 20px; font-size: 14px; font-weight: normal; }

        /* 强化版的撤销按钮 */
        .btn-undo { padding: 8px 16px; font-size: 14px; border-radius: 20px; background-color: #ffebee; color: #d32f2f; border: 2px solid #ffcdd2; font-weight: bold; box-shadow: 0 2px 5px rgba(211,47,47,0.1); }

        .result-box { text-align: center; padding: 30px 20px; background: linear-gradient(135deg, #fff 0%, #fff3e0 100%);}
        .result-title { color: var(--text-sub); font-size: 15px; margin-bottom: 5px; }
        .result-number { font-size: 48px; font-weight: 900; margin: 0; text-shadow: 2px 2px 0 rgba(0,0,0,0.05); }
        .text-green { color: #81c784; } 
        .text-red { color: var(--danger-color); }   
        .text-unit { font-size: 16px; font-weight: normal; color: var(--text-sub); margin-left: 5px;}

        hr { border: 0; border-top: 2px dashed #ffe0b2; margin: 20px 0; }
        ul { list-style: none; padding: 0; margin: 0; }
        li { padding: 15px 5px; border-bottom: 1px solid #fff3e0; display: flex; justify-content: space-between; align-items: center; }
        .food-tag { background-color: #f1f8e9; color: #689f38; padding: 3px 8px; border-radius: 8px; font-size: 12px; margin-right: 5px; }
        .empty-tip { color: var(--text-sub); font-size: 14px; text-align: center; padding: 10px 0; font-style: italic;}
        .icon-paws { margin-right: 8px; color: var(--primary-color); }

        .dashboard { display: flex; justify-content: space-around; background-color: #fff9c4; padding: 15px; border-radius: var(--radius-small); margin-bottom: 15px; }
        .dash-item { text-align: center; }
        .dash-label { font-size: 12px; color: var(--text-sub); margin-bottom: 4px; }
        .dash-value { font-size: 20px; font-weight: 900; }

        /* 底部导航栏 */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background-color: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 15px 10px; padding-bottom: calc(15px + env(safe-area-inset-bottom)); box-shadow: 0 -2px 20px rgba(0,0,0,0.05); border-top-left-radius: 30px; border-top-right-radius: 30px; z-index: 1000; }
        .nav-item { text-align: center; color: #d7ccc8; font-size: 12px; font-weight: bold; width: 50%; transition: 0.3s; }
        .nav-item.active { color: var(--primary-color); transform: scale(1.05); }
        .nav-icon { font-size: 24px; margin-bottom: 4px; display: block; }

        /* 统计卡片 */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .stat-box { background: #fafafa; padding: 15px; border-radius: var(--radius-small); text-align: center; border: 1px solid #f5f5f5;}
        .stat-val { font-size: 22px; font-weight: 900; margin-top: 5px; color: var(--text-main); }

        /* 图表容器 */
        .chart-container { position: relative; height: 250px; width: 100%; margin-top: 15px;}
    </style>
</head>
<body>

    <div id="viewRecord">
        <div class="card result-box">
            <div class="result-title">✨ 今日热量缺口 ✨</div>
            <div id="deficitDisplay" class="result-number">0<span class="text-unit">kcal</span></div>
            <p style="color: var(--text-sub); font-size: 13px; margin: 10px 0 0 0;">(消耗 - 摄入 = 变瘦的动力!)</p>
        </div>

        <div class="card">
            <h3><span class="icon-paws">🔥</span>今日大作战消耗</h3>
            <input type="number" id="burnInput" placeholder="输入基础代谢 + 运动 (例: 1950)">
            <button class="btn-block btn-primary" onclick="updateBurn()">💖 记住了</button>
        </div>

        <div class="card">
            <h3><span class="icon-paws">🍬</span>我的专属零食筐</h3>
            <div id="quickAddArea" style="margin-bottom: 10px;"></div>
            <hr>
            <div style="font-size:14px; color:var(--text-sub); margin-bottom:10px;">添加新食物 (蛋白质/碳水可不填)：</div>
            <div class="input-row">
                <input type="text" id="newFoodName" placeholder="食物名字" style="flex: 2;">
                <input type="number" id="newFoodCal" placeholder="热量(kcal)" style="flex: 1.5;">
            </div>
            <div class="input-row">
                <input type="number" id="newFoodPro" placeholder="🥩蛋白质(g)" style="flex: 1;">
                <input type="number" id="newFoodCarb" placeholder="🍚碳水(g)" style="flex: 1;">
            </div>
            <button class="btn-block btn-success" style="margin-top: 5px;" onclick="addNewFood()">➕ 塞进筐里并吃掉</button>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="margin:0;"><span class="icon-paws">📝</span>今日进食清单</h3>
                <button class="btn-undo" id="undoBtn" onclick="undoLastIntake()" style="display:none;">🔙 撤销上一笔</button>
            </div>
            <div class="dashboard">
                <div class="dash-item"><div class="dash-label">🔥 总热量</div><div class="dash-value" id="totalCalDisplay" style="color: var(--primary-color);">0</div></div>
                <div class="dash-item"><div class="dash-label">🥩 蛋白质</div><div class="dash-value" id="totalProDisplay" style="color: var(--protein-color);">0g</div></div>
                <div class="dash-item"><div class="dash-label">🍚 碳水</div><div class="dash-value" id="totalCarbDisplay" style="color: var(--carbs-color);">0g</div></div>
            </div>
            <ul id="intakeList"></ul>
            
            <button class="btn-block btn-primary" style="margin-top: 25px; background-color: #64b5f6; box-shadow: 0 4px 10px rgba(100,181,246,0.3);" onclick="finishToday()">📦 封存今天，迎接明天</button>
        </div>
    </div>

    <div id="viewStats" style="display: none;">
        
        <div class="card result-box" style="padding: 20px;">
            <h2 style="margin:0; color:var(--primary-color);">📊 我的成长足迹</h2>
            <p style="color: var(--text-sub); font-size: 13px; margin: 5px 0 0 0;">数据不会骗人，你流的汗都算数！</p>
        </div>

        <div class="card">
            <h3>📈 最近7次热量缺口走势</h3>
            <div class="chart-container">
                <canvas id="deficitChart"></canvas>
            </div>
            <p id="chartTip" style="text-align:center; font-size:12px; color:#888; display:none;">(数据不足，封存几天后再来看看折线图吧！)</p>
        </div>

        <div class="card">
            <h3>📅 最近 7 天平均值 <span id="days7Count" style="font-size:12px; font-weight:normal; color:#888; margin-left:auto;"></span></h3>
            <div class="stat-grid">
                <div class="stat-box"><div class="dash-label">🔥 日均摄入</div><div class="stat-val" id="s7_cal">0</div></div>
                <div class="stat-box"><div class="dash-label">✨ 日均缺口</div><div class="stat-val" id="s7_def">0</div></div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" id="navRecord" onclick="switchTab('record')">
            <span class="nav-icon">📝</span>今日打卡
        </div>
        <div class="nav-item" id="navStats" onclick="switchTab('stats')">
            <span class="nav-icon">📊</span>历史统计
        </div>
    </div>

    <script>
        // --- 数据初始化 (自动向下兼容读取旧版本数据) ---
        let savedFoods = JSON.parse(localStorage.getItem('savedFoods_v4')) || JSON.parse(localStorage.getItem('savedFoods_v3')) || JSON.parse(localStorage.getItem('savedFoods_v2')) || []; 
        let todayIntake = JSON.parse(localStorage.getItem('todayIntake_v4')) || JSON.parse(localStorage.getItem('todayIntake_v3')) || [];
        let dailyBurn = parseFloat(localStorage.getItem('dailyBurn_v4')) || parseFloat(localStorage.getItem('dailyBurn_v3')) || 0;
        let historyData = JSON.parse(localStorage.getItem('historyData_v4')) || JSON.parse(localStorage.getItem('historyData_v3')) || [];

        let currentTotalCal = 0, currentTotalPro = 0, currentTotalCarb = 0;
        let myChartInstance = null; // 用于存放图表对象

        document.getElementById('burnInput').value = dailyBurn || '';
        renderApp();

        // --- 页面切换逻辑 ---
        function switchTab(tab) {
            let vRecord = document.getElementById('viewRecord');
            let vStats = document.getElementById('viewStats');
            let nRecord = document.getElementById('navRecord');
            let nStats = document.getElementById('navStats');

            if (tab === 'record') {
                vRecord.style.display = 'block'; vStats.style.display = 'none';
                nRecord.className = 'nav-item active'; nStats.className = 'nav-item';
            } else {
                vRecord.style.display = 'none'; vStats.style.display = 'block';
                nRecord.className = 'nav-item'; nStats.className = 'nav-item active';
                renderStats(); // 每次进入统计页，重新画图表和计算平均值
            }
        }

        // --- 核心功能函数 ---
        function formatNum(num) { return parseFloat(num.toFixed(1)); }

        function updateBurn() {
            dailyBurn = parseFloat(document.getElementById('burnInput').value) || 0;
            localStorage.setItem('dailyBurn_v4', dailyBurn);
            renderApp();
            alert("消耗量保存成功！✨");
        }

        function addNewFood() {
            let name = document.getElementById('newFoodName').value;
            let cal = parseFloat(document.getElementById('newFoodCal').value);
            let pro = parseFloat(document.getElementById('newFoodPro').value) || 0;
            let carb = parseFloat(document.getElementById('newFoodCarb').value) || 0;
            
            if (!name || isNaN(cal)) { alert("请务必填写食物名字和热量哦！"); return; }

            savedFoods.push({ name: name, calories: cal, protein: pro, carbs: carb });
            localStorage.setItem('savedFoods_v4', JSON.stringify(savedFoods));
            recordIntake(name, cal, pro, carb);

            document.getElementById('newFoodName').value = '';
            document.getElementById('newFoodCal').value = '';
            document.getElementById('newFoodPro').value = '';
            document.getElementById('newFoodCarb').value = '';
        }

        function recordIntake(name, cal, pro, carb) {
            todayIntake.push({ name: name, calories: cal, protein: pro || 0, carbs: carb || 0, time: new Date().getTime() });
            localStorage.setItem('todayIntake_v4', JSON.stringify(todayIntake));
            renderApp();
        }

        // ⭐ 强化版撤销功能
        function undoLastIntake() {
            if (todayIntake.length === 0) return;
            // 直接获取最后一条吃掉的食物名称，让提示更温馨
            let lastFood = todayIntake[todayIntake.length - 1].name;
            if(confirm(`确定要撤销刚刚吃掉的【${lastFood}】吗？ 🔙`)) {
                todayIntake.pop(); 
                localStorage.setItem('todayIntake_v4', JSON.stringify(todayIntake));
                renderApp();
            }
        }

        function finishToday() {
            if(todayIntake.length === 0 && dailyBurn === 0) {
                alert("今天啥也没记呢，先记几笔吧！"); return;
            }
            if(!confirm("确定要【封存】今天的数据吗？\n存入历史后，今日列表将被清空，开始崭新的一天！📦")) { return; }

            let todayDateStr = new Date().toLocaleDateString('zh-CN', {month:'numeric', day:'numeric'});
            historyData = historyData.filter(d => d.date !== todayDateStr);

            historyData.push({ date: todayDateStr, cal: currentTotalCal, burn: dailyBurn, pro: currentTotalPro, carb: currentTotalCarb });
            localStorage.setItem('historyData_v4', JSON.stringify(historyData));

            todayIntake = [];
            localStorage.setItem('todayIntake_v4', JSON.stringify(todayIntake));
            
            renderApp();
            alert("✨ 封存成功！赶紧去【历史统计】看看你的折线图吧！");
        }

        // --- 渲染页面 ---
        function renderApp() {
            let quickArea = document.getElementById('quickAddArea');
            quickArea.innerHTML = '';
            if (savedFoods.length === 0) {
                quickArea.innerHTML = '<div class="empty-tip">在下方添加常用食物，以后一键打卡！👇</div>';
            } else {
                savedFoods.forEach(food => {
                    let btn = document.createElement('button');
                    btn.className = 'btn-food';
                    btn.innerText = `${food.name} (${food.calories})`;
                    btn.onclick = () => recordIntake(food.name, food.calories, food.protein, food.carbs);
                    quickArea.appendChild(btn);
                });
            }

            let undoBtn = document.getElementById('undoBtn');
            undoBtn.style.display = todayIntake.length > 0 ? 'inline-block' : 'none';

            currentTotalCal = 0; currentTotalPro = 0; currentTotalCarb = 0;
            let listArea = document.getElementById('intakeList');
            listArea.innerHTML = '';
            
            if (todayIntake.length === 0) {
                listArea.innerHTML = '<div class="empty-tip">今天还没嗷呜吃东西呢~ 💤</div>';
            } else {
                let renderList = [...todayIntake].reverse();
                renderList.forEach(item => {
                    currentTotalCal += item.calories; currentTotalPro += item.protein; currentTotalCarb += item.carbs;
                    let li = document.createElement('li');
                    li.innerHTML = `
                        <div style="display:flex; flex-direction:column; gap:5px;">
                            <div><span class="food-tag">嗷呜</span><span style="font-weight:bold;">${item.name}</span></div>
                            <div style="font-size:12px; color:var(--text-sub);">🥩 蛋白: ${item.protein}g | 🍚 碳水: ${item.carbs}g</div>
                        </div>
                        <div style="font-weight:bold; color:var(--text-main); font-size:18px;">
                            ${item.calories} <span style="font-size:12px; font-weight:normal; color:var(--text-sub);">kcal</span>
                        </div>`;
                    listArea.appendChild(li);
                });
            }
            
            document.getElementById('totalCalDisplay').innerText = formatNum(currentTotalCal);
            document.getElementById('totalProDisplay').innerText = formatNum(currentTotalPro) + 'g';
            document.getElementById('totalCarbDisplay').innerText = formatNum(currentTotalCarb) + 'g';

            let deficit = dailyBurn - currentTotalCal;
            let deficitDisplay = document.getElementById('deficitDisplay');
            
            if (dailyBurn === 0) {
                deficitDisplay.innerHTML = `?<span class="text-unit">kcal</span>`;
                deficitDisplay.className = 'result-number';
            } else {
                deficitDisplay.innerHTML = `${formatNum(deficit)}<span class="text-unit">kcal</span>`;
                if (deficit > 0) deficitDisplay.className = 'result-number text-green';
                else if (deficit < 0) deficitDisplay.className = 'result-number text-red';
                else deficitDisplay.className = 'result-number'; 
            }
        }

        // ⭐ 新增：绘制折线图与计算统计
        function renderStats() {
            // 计算 7 天平均值
            let data7 = historyData.slice(-7);
            document.getElementById('days7Count').innerText = `(已记录 ${data7.length} 天)`;
            
            if(data7.length === 0) {
                document.getElementById('s7_cal').innerText = "--";
                document.getElementById('s7_def').innerText = "--";
                document.getElementById('chartTip').style.display = 'block';
                return;
            } else {
                document.getElementById('chartTip').style.display = 'none';
            }

            let sumCal = 0, sumBurn = 0;
            data7.forEach(d => { sumCal += d.cal; sumBurn += d.burn; });
            document.getElementById('s7_cal').innerText = formatNum(sumCal / data7.length);
            let avgDef = (sumBurn - sumCal) / data7.length;
            let defEl = document.getElementById('s7_def');
            defEl.innerText = formatNum(avgDef);
            defEl.style.color = avgDef > 0 ? "#81c784" : (avgDef < 0 ? "var(--danger-color)" : "var(--text-main)");

            // --- 绘制折线图 ---
            // 准备 X 轴日期和 Y 轴缺口数据
            let labels = data7.map(d => d.date);
            let chartDataPoints = data7.map(d => d.burn - d.cal);

            const ctx = document.getElementById('deficitChart').getContext('2d');
            
            // 如果图表已经存在，先销毁旧的，不然鼠标放上去会闪烁（重叠Bug）
            if (myChartInstance) {
                myChartInstance.destroy();
            }

            // 生成美丽的新折线图
            myChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '热量缺口 (kcal)',
                        data: chartDataPoints,
                        borderColor: '#ff9242',       // 橙色线条
                        backgroundColor: 'rgba(255, 146, 66, 0.15)', // 线条下方的渐变填充
                        borderWidth: 3,
                        tension: 0.4,                 // 0.4 让线条变得圆润平滑
                        fill: true,
                        pointBackgroundColor: '#fff',
                        pointBorderColor: '#ff9242',
                        pointBorderWidth: 2,
                        pointRadius: 4,
                        pointHoverRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }, // 隐藏多余的图例
                        tooltip: {
                            backgroundColor: 'rgba(93, 64, 55, 0.9)',
                            padding: 10,
                            displayColors: false,
                            callbacks: {
                                label: function(context) {
                                    return context.parsed.y > 0 ? `瘦了！缺口: ${context.parsed.y}` : `超标: ${context.parsed.y}`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            grid: { color: '#f5f5f5', drawBorder: false },
                            ticks: { color: '#a1887f', font: {size: 11} }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#a1887f', font: {size: 11} }
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
